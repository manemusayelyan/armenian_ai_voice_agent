services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml --dev --bind 0.0.0.0 --node-ip 127.0.0.1
    ports:
      - "7885:7885"
      - "7886:7886"
      - "7887:7887/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    environment:
      - "LIVEKIT_KEYS=devkey: secret"
